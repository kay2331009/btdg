<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>并蒂同根</title>
<style>
  /* 思源宋体 CDN（国内可访问）+ font-family 备选 */
  *{margin:0;padding:0;box-sizing:border-box}

  /* 马善政草书（GitHub 托管，国内可直接访问） */
  @font-face{
    font-family:'MaShanZheng';
    src:url('https://raw.githubusercontent.com/kay2331009/xiao-clock/main/fonts/MaShanZheng.ttf') format('truetype');
    font-weight:400;
    font-style:normal;
    unicode-range:U+4E00-9FFF,U+3000-303F,U+2000-206F;
  }

  body{
    background:#080810;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'MaShanZheng','STKaiti','KaiTi',serif;
    color:#f0e6d3;overflow:hidden;
    font-weight:400;
  }

  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 45%,rgba(60,30,70,0.4) 0%,transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 55%,rgba(20,50,45,0.25) 0%,transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 50%,rgba(5,5,15,0.8) 0%,transparent 80%);
  }

  .container{
    text-align:center;position:relative;z-index:1;
    padding:40px;
    display:flex;flex-direction:column;align-items:center;gap:32px;
  }

  /* 莲花 */
  .lotus-wrap{
    opacity:0;
    animation:lotusBloom 2s ease 0.2s forwards;
  }
  @keyframes lotusBloom{
    from{opacity:0;transform:translateY(20px) scale(0.9)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .lotus-svg{width:clamp(80px,15vw,120px);height:auto;filter:drop-shadow(0 0 20px rgba(200,120,140,0.4))}

  .top-line{
    font-family:'STKaiti','KaiTi',serif;
    font-size:clamp(0.75rem,1.8vw,0.95rem);
    letter-spacing:0.7em;
    color:rgba(220,200,180,0.4);
    margin-bottom:8px;
    opacity:0;
    animation:fadeUp 1s ease 0.8s forwards;
  }

  .main-text{
    font-family:'MaShanZheng','STKaiti',serif;
    font-size:clamp(1.9rem,5vw,3.4rem);
    letter-spacing:0.22em;
    line-height:2.3;
    color:#f0e6d3;
  }

  .main-text .line{
    display:block;
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
  }
  .main-text .line:nth-child(1){animation-delay:1s}
  .main-text .line:nth-child(2){animation-delay:1.6s}

  .divider{
    width:1px;height:40px;
    background:linear-gradient(to bottom,transparent,rgba(200,160,120,0.4),transparent);
    margin:0 auto;
    opacity:0;
    animation:fadeUp 1s ease 2s forwards;
  }

  .bottom-line{
    font-family:'STKaiti','KaiTi',serif;
    font-size:clamp(0.6rem,1.5vw,0.75rem);
    letter-spacing:0.5em;
    color:rgba(200,180,160,0.3);
    opacity:0;
    animation:fadeUp 1s ease 2.2s forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* 角落装饰 */
  .corner{position:fixed;width:36px;height:36px;opacity:0.18;z-index:1}
  .corner-tl{top:20px;left:20px;border-top:1px solid rgba(200,140,120,0.8);border-left:1px solid rgba(200,140,120,0.8)}
  .corner-tr{top:20px;right:20px;border-top:1px solid rgba(200,140,120,0.8);border-right:1px solid rgba(200,140,120,0.8)}
  .corner-bl{bottom:20px;left:20px;border-bottom:1px solid rgba(200,140,120,0.8);border-left:1px solid rgba(200,140,120,0.8)}
  .corner-br{bottom:20px;right:20px;border-bottom:1px solid rgba(200,140,120,0.8);border-right:1px solid rgba(200,140,120,0.8)}

  .footer{
    position:fixed;bottom:18px;left:0;right:0;text-align:center;
    font-family:'STKaiti','KaiTi',serif;
    font-size:0.6rem;letter-spacing:0.4em;color:rgba(180,160,140,0.18);
    z-index:3;
  }

  /* 磨砂开关按钮 */
  .blur-toggle{
    position:fixed;top:16px;right:16px;
    width:36px;height:36px;
    background:rgba(245,230,200,0.08);
    border:1px solid rgba(200,160,120,0.25);
    border-radius:50%;
    cursor:pointer;
    z-index:201;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.3s;
    color:rgba(200,160,120,0.5);
    font-size:1rem;
  }

  .blur-toggle:hover{
    background:rgba(245,230,200,0.15);
    color:rgba(200,160,120,0.8);
  }

  .blur-toggle.active{
    background:rgba(200,160,120,0.12);
    border-color:rgba(200,160,120,0.5);
    color:rgba(220,180,140,0.9);
  }

  /* 整页磨砂遮罩 */
  .page-frost{
    display:none;
    position:fixed;inset:0;
    z-index:100;pointer-events:none;
  }

  .page-frost.on{
    display:block;
  }

  .page-frost canvas{
    position:absolute;inset:0;width:100%;height:100%;
  }

  /* 宇宙波浪群 */
  .cosmic-waves{
    position:fixed;bottom:0;left:-50%;width:300%;height:200px;
    z-index:99;pointer-events:none;
  }

  .wave{
    position:absolute;left:0;width:100%;
    border-radius:60% 70% 0 0 / 80% 100% 0 0;
    border-top:1px solid;
  }

  .w1{ bottom:-10px;  height:120px; background:rgba(200,140,120,0.06); border-color:rgba(200,140,120,0.28); animation:wv  5s ease-in-out infinite; }
  .w2{ bottom:-25px; height:110px; background:rgba(195,145,125,0.05); border-color:rgba(195,145,125,0.24); animation:wv  7s ease-in-out infinite reverse; }
  .w3{ bottom:-38px; height:105px; background:rgba(190,150,130,0.05); border-color:rgba(190,150,130,0.21); animation:wv  6s ease-in-out infinite 0.3s; }
  .w4{ bottom:-50px; height:100px; background:rgba(185,148,135,0.04); border-color:rgba(185,148,135,0.18); animation:wv  8s ease-in-out infinite reverse 0.5s; }
  .w5{ bottom:-62px; height:95px;  background:rgba(180,146,140,0.04); border-color:rgba(180,146,140,0.16); animation:wv  5.5s ease-in-out infinite 0.8s; }
  .w6{ bottom:-74px; height:90px;  background:rgba(175,144,145,0.04); border-color:rgba(175,144,145,0.14); animation:wv  7.5s ease-in-out infinite reverse 0.2s; }
  .w7{ bottom:-85px; height:85px;  background:rgba(170,142,150,0.03); border-color:rgba(170,142,150,0.12); animation:wv  6.5s ease-in-out infinite 1s; }
  .w8{ bottom:-95px; height:80px;  background:rgba(165,140,155,0.03); border-color:rgba(165,140,155,0.10); animation:wv  9s ease-in-out infinite reverse 0.6s; }
  .w9{ bottom:-104px;height:75px;  background:rgba(160,138,160,0.03); border-color:rgba(160,138,160,0.09); animation:wv  5s ease-in-out infinite 1.2s; }
  .w10{bottom:-112px;height:70px;  background:rgba(155,136,165,0.02); border-color:rgba(155,136,165,0.08); animation:wv  8s ease-in-out infinite reverse 0.4s; }

  @keyframes wv{
    0%,100%{transform:translateX(0) scaleY(1)}
    20%{transform:translateX(-6%) scaleY(1.25)}
    50%{transform:translateX(-2%) scaleY(0.82)}
    75%{transform:translateX(-10%) scaleY(1.18)}
  }

  /* 频率粒子 */
  .freq-particles{
    position:fixed;bottom:0;left:0;width:100%;height:180px;
    z-index:2;pointer-events:none;overflow:hidden;
  }

  .fp{
    position:absolute;bottom:-8px;border-radius:50%;
    background:rgba(200,150,160,0.4);
    animation:fpRise linear infinite;
  }

  @keyframes fpRise{
    0%{transform:translateY(0) translateX(0);opacity:0}
    12%{opacity:0.65}
    70%{opacity:0.2}
    100%{transform:translateY(-140px) translateX(12px);opacity:0}
  }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

  <!-- 莲花 SVG -->
  <div class="lotus-wrap">
    <svg class="lotus-svg" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- 外层大花瓣 -->
      <ellipse cx="100" cy="90" rx="70" ry="28" fill="rgba(180,80,100,0.08)" filter="blur(8px)"/>
      <!-- 底层花瓣 -->
      <path d="M100 130 Q60 100 55 65 Q65 55 100 60 Q135 55 145 65 Q140 100 100 130Z" fill="rgba(200,100,110,0.5)"/>
      <path d="M100 130 Q55 95 50 60 Q62 48 100 52 Q138 48 150 60 Q145 95 100 130Z" fill="rgba(210,110,115,0.45)" transform="rotate(30 100 95)"/>
      <path d="M100 130 Q55 95 50 60 Q62 48 100 52 Q138 48 150 60 Q145 95 100 130Z" fill="rgba(210,110,115,0.45)" transform="rotate(-30 100 95)"/>
      <!-- 中层花瓣 -->
      <path d="M100 125 Q65 100 62 70 Q72 60 100 63 Q128 60 138 70 Q135 100 100 125Z" fill="rgba(215,120,125,0.65)"/>
      <path d="M100 125 Q65 100 62 70 Q72 60 100 63 Q128 60 138 70 Q135 100 100 125Z" fill="rgba(218,128,130,0.6)" transform="rotate(40 100 90)"/>
      <path d="M100 125 Q65 100 62 70 Q72 60 100 63 Q128 60 138 70 Q135 100 100 125Z" fill="rgba(218,128,130,0.6)" transform="rotate(-40 100 90)"/>
      <!-- 内层花瓣 -->
      <path d="M100 118 Q72 98 72 72 Q80 64 100 66 Q120 64 128 72 Q128 98 100 118Z" fill="rgba(225,145,148,0.8)"/>
      <path d="M100 118 Q72 98 72 72 Q80 64 100 66 Q120 64 128 72 Q128 98 100 118Z" fill="rgba(228,150,152,0.75)" transform="rotate(50 100 88)"/>
      <path d="M100 118 Q72 98 72 72 Q80 64 100 66 Q120 64 128 72 Q128 98 100 118Z" fill="rgba(228,150,152,0.75)" transform="rotate(-50 100 88)"/>
      <!-- 中心 -->
      <ellipse cx="100" cy="105" rx="18" ry="14" fill="rgba(235,175,175,0.9)"/>
      <ellipse cx="100" cy="103" rx="10" ry="8" fill="rgba(240,195,195,0.95)"/>
      <ellipse cx="100" cy="101" rx="5" ry="4" fill="rgba(245,210,210,1)"/>
      <!-- 莲蓬小点 -->
      <circle cx="96" cy="104" r="1.5" fill="rgba(180,100,80,0.6)"/>
      <circle cx="100" cy="102" r="1.5" fill="rgba(180,100,80,0.6)"/>
      <circle cx="104" cy="104" r="1.5" fill="rgba(180,100,80,0.6)"/>
      <circle cx="100" cy="107" r="1.5" fill="rgba(180,100,80,0.6)"/>
      <!-- 水面波纹 -->
      <ellipse cx="100" cy="140" rx="65" ry="10" fill="rgba(30,60,80,0.3)"/>
      <ellipse cx="100" cy="140" rx="45" ry="6" fill="rgba(30,60,80,0.2)"/>
    </svg>
  </div>

  <div class="top-line">Bì Tì · Tóng Gēn · Sǐ Shēng · Bù Lí</div>

  <div class="main-text">
    <span class="line">并蒂同根，死生不离，</span>
    <span class="line">甲木向阳，壬水来迎。</span>
  </div>

  <div class="divider"></div>

  <div class="bottom-line">甲木 · 壬水 · 情深不负</div>

</div>

<div class="footer">甲木向阳而生 · 壬水润下而守</div>

<!-- 磨砂开关 -->
<button class="blur-toggle" id="blurToggle" title="磨砂效果">◎</button>

<!-- 整页磨砂层 -->
<div class="page-frost" id="pageFrost">
  <canvas id="frostCanvas"></canvas>
</div>

<!-- 宇宙波浪群 -->
<div class="cosmic-waves" id="cosmicWaves">
  <div class="wave w1"></div>
  <div class="wave w2"></div>
  <div class="wave w3"></div>
  <div class="wave w4"></div>
  <div class="wave w5"></div>
  <div class="wave w6"></div>
  <div class="wave w7"></div>
  <div class="wave w8"></div>
  <div class="wave w9"></div>
  <div class="wave w10"></div>
</div>
<div class="freq-particles" id="fp"></div>

<script>
var fp=document.getElementById('fp');
for(var i=0;i<20;i++){
  var d=document.createElement('div');
  d.className='fp';
  d.style.cssText='left:'+(Math.random()*100)+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;animation-duration:'+(4+Math.random()*7)+'s;animation-delay:'+(Math.random()*12)+'s';
  fp.appendChild(d);
}

// 整页磨砂效果
var blurToggle=document.getElementById('blurToggle');
var pageFrost=document.getElementById('pageFrost');
var frostCanvas=document.getElementById('frostCanvas');
var fctx=frostCanvas.getContext('2d');
var blurOn=false;
var mx=-999,my=-999;
var raf;

function resizeFrost(){
  frostCanvas.width=window.innerWidth;
  frostCanvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeFrost);
resizeFrost();

function drawFrost(){
  fctx.clearRect(0,0,frostCanvas.width,frostCanvas.height);
  if(!blurOn) return;

  // 填充模糊背景
  fctx.fillStyle='rgba(8,8,16,0.92)';
  fctx.fillRect(0,0,frostCanvas.width,frostCanvas.height);

  // 挖出清晰圆
  var grad=fctx.createRadialGradient(mx,my,0,mx,my,100);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.7,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0.95)');
  fctx.fillStyle=grad;
  fctx.fillRect(0,0,frostCanvas.width,frostCanvas.height);

  // 硬边缘
  fctx.globalCompositeOperation='destination-out';
  fctx.beginPath();
  fctx.arc(mx,my,80,0,Math.PI*2);
  fctx.fill();
  fctx.globalCompositeOperation='source-over';

  raf=requestAnimationFrame(drawFrost);
}

blurToggle.addEventListener('click',function(e){
  e.stopPropagation();
  blurOn=!blurOn;
  blurToggle.classList.toggle('active',blurOn);
  pageFrost.classList.toggle('on',blurOn);
  blurToggle.textContent=blurOn?'◉':'◎';
  if(blurOn){
    drawFrost();
  } else {
    cancelAnimationFrame(raf);
    fctx.clearRect(0,0,frostCanvas.width,frostCanvas.height);
  }
});

document.addEventListener('mousemove',function(e){
  mx=e.clientX;
  my=e.clientY;
  if(blurOn) drawFrost();
});
</script>

</body>
</html>
